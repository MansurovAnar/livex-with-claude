name: Build and Push to GHCR (No Auto-Deploy)

on:
  push:
    branches:
      - master

permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    name: Build & Push Service Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # New Step: Convert the repository name to lowercase and save it
      - name: Lowercase Repository Name
        id: string
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1. Build and Push Backend Service
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          # Uses the lowercase repository name environment variable
          tags: ghcr.io/${{ env.REPO_LOWER }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. Build and Push Frontend Service (Vite App)
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          # Uses the lowercase repository name environment variable
          tags: ghcr.io/${{ env.REPO_LOWER }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max