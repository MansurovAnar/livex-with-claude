version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-examadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-exampassword}
      POSTGRES_DB: ${POSTGRES_DB:-exam_control}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U examadmin -d exam_control']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://examadmin:exampassword@postgres:5432/exam_control
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret_32bytes_long}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changeme_refresh_secret_32bytes}
      ACCESS_TOKEN_TTL: 900
      REFRESH_TOKEN_TTL: 604800
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - '4000:4000'
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:4000/api
      VITE_WS_URL: ws://localhost:4000/ws
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
